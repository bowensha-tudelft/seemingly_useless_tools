<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { width: 420px; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #1a1a2e; color: #eee; padding: 16px; }
  h2 { font-size: 16px; margin-bottom: 12px; color: #00b5e5; display: flex; align-items: center; gap: 8px; }
  .tab-item { display: flex; align-items: center; gap: 6px; padding: 6px 7px; background: #16213e; border-radius: 6px; margin-bottom: 4px; font-size: 12px; }
  .tab-item.sleep { opacity: 0.55; border-left: 2px solid #f0a500; }
  .tab-item.pinned { border-left: 2px solid #4caf50; background: #162622; }
  .tab-item .index { color: #888; min-width: 14px; text-align: right; font-size: 11px; }
  .tab-item .title { flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .tab-item .duration { color: #00b5e5; font-weight: 600; min-width: 38px; text-align: right; font-size: 12px; }
  .tab-item .duration.na { color: #666; }
  .tab-item .tag { font-size: 10px; padding: 2px 6px; border-radius: 3px; white-space: nowrap; }
  .tag.sleep { background: #5a4200; color: #f0a500; }
  .tag.diag  { background: #1a3a5a; color: #6ab0d0; font-family: monospace; cursor: help; }
  .tag.pin   { background: #1a3a2a; color: #6bc96b; }
  .pin-btn { cursor: pointer; font-size: 14px; line-height: 1; padding: 0 2px; opacity: 0.4; transition: opacity 0.15s; user-select: none; flex-shrink: 0; }
  .pin-btn:hover { opacity: 1; }
  .pin-btn.on { opacity: 0.9; }
  .empty { text-align: center; padding: 24px; color: #666; font-size: 14px; }
  .btn-row { display: flex; gap: 8px; margin-bottom: 10px; }
  button { flex: 1; padding: 7px 0; border: none; border-radius: 6px; cursor: pointer; font-size: 12px; font-weight: 600; transition: opacity 0.2s; }
  button:disabled { opacity: 0.4; cursor: not-allowed; }
  .btn-refresh { background: #0f3460; color: #e0e0e0; }
  .btn-sort { background: #00b5e5; color: #1a1a2e; }
  .btn-wake { background: #f0a500; color: #1a1a2e; display: none; }
  .btn-refresh:hover:not(:disabled) { background: #1a4a7a; }
  .btn-sort:hover:not(:disabled) { background: #00d4ff; }
  .btn-wake:hover:not(:disabled) { background: #f5b820; }
  .status { font-size: 11px; color: #888; text-align: center; margin-top: 6px; min-height: 16px; }
  .status.ok { color: #4caf50; }
  .summary { font-size: 11px; color: #888; margin-bottom: 8px; display: flex; justify-content: space-between; }
</style>
</head>
<body>
<h2>📺 B站标签页排序</h2>
<div class="btn-row">
  <button class="btn-refresh" id="btn-refresh">🔄 刷新</button>
  <button class="btn-sort" id="btn-sort" disabled>📊 按时长排序</button>
  <button class="btn-wake" id="btn-wake">💤 唤醒</button>
</div>
<div class="summary" id="summary"></div>
<div id="list"></div>
<div class="status" id="status"></div>
<script src="popup.js"></script>
</body>
</html>
